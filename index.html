<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InsightX Pro — Analytics Dashboard</title>
    <meta name="description" content="InsightX Pro: PowerBI-inspired client-side data analytics. Upload CSV/Excel, visualize, clean, and export PDF reports."/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Apply theme SYNCHRONOUSLY before React mounts to prevent flash -->
    <script>
      (function() {
        // Clear old dark theme default and force light as new default
        var storedTheme = localStorage.getItem('ix_theme');
        var theme = 'light';  // New default is light
        if (storedTheme && storedTheme !== 'dark') {
          theme = storedTheme;  // Respect user choice if not old default
        }
        localStorage.setItem('ix_theme', theme);
        var color = localStorage.getItem('ix_primary') || '#7c3aed';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.setProperty('--primary-color', color);
        document.documentElement.style.setProperty('--primary-color-alpha', color + '33');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
